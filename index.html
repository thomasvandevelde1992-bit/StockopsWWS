<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<meta name="theme-color" content="#F2F5EF"/>

<link rel="manifest" href="manifest.json">

<title>StockOps</title>

<style>
:root{
  --bg:#F2F5EF;
  --bg2:#FFFFFF;
  --bg3:#E8EDE3;
  --border:#D4DBC8;
  --border2:#BFC9B0;
  --accent:#5C7A4E;
  --accent2:#7A9668;
  --accent3:#3D5C30;
  --green:#4A8C5C;
  --amber:#B5860D;
  --red:#C0392B;
  --text:#2C3A22;
  --text3:#8A9A7A;
}
body{margin:0;background:var(--bg);font-family:'Outfit',sans-serif;}
.screen{display:none;}
.screen.active{display:block;}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;padding:12px;margin:10px;}
.btn{background:var(--accent);color:#fff;padding:10px;border:none;border-radius:8px;cursor:pointer;}
.input{width:100%;padding:10px;border-radius:8px;border:1px solid var(--border);margin-bottom:10px;}
</style>
</head>

<body>

<div id="app">

<!-- ONBOARD -->
<div id="screen-onboard" class="screen active">
  <div class="card">
    <h2>📦 StockOps</h2>
    <input id="name-input" class="input" placeholder="Votre nom"/>
    <button class="btn" onclick="startApp()">Entrer</button>
  </div>
</div>

<!-- MAIN -->
<div id="screen-main" class="screen">

<div class="card">
<b id="user-label"></b>
</div>

<!-- STATS -->
<div class="card">
<div>Total : <span id="s-total">0</span></div>
<div>Critiques : <span id="s-crit">0</span></div>
<div>Épuisés : <span id="s-empty">0</span></div>
<div>Valeur : <span id="s-value">0€</span></div>
<div>Mouvements : <span id="s-moves">0</span></div>
</div>

<!-- ADD -->
<div class="card">
<input id="f-name" class="input" placeholder="Nom produit"/>
<input id="f-qty" type="number" class="input" placeholder="Quantité"/>
<input id="f-min" type="number" class="input" placeholder="Seuil min"/>
<input id="f-price" type="number" class="input" placeholder="Prix €"/>
<button id="add-btn" class="btn" onclick="addItem()">Ajouter</button>
</div>

<!-- LIST -->
<div id="items-list"></div>

</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, onSnapshot, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const app = initializeApp({
  apiKey:"TON_API_KEY",
  authDomain:"stockopps-300ea.firebaseapp.com",
  projectId:"stockopps-300ea"
});

const db = getFirestore(app);

let items = [];
let hist = [];
let user = "";

// START
window.startApp = function(){
  user = document.getElementById("name-input").value.trim();
  if(!user) return;

  document.getElementById("user-label").innerText = "👤 "+user;
  document.getElementById("screen-onboard").classList.remove("active");
  document.getElementById("screen-main").classList.add("active");

  listen();
};

// LISTEN
function listen(){
  onSnapshot(collection(db,"items"), snap=>{
    items = snap.docs.map(d=>({id:d.id,...d.data()}));
    render();
  });

  onSnapshot(collection(db,"history"), snap=>{
    hist = snap.docs.map(d=>d.data());
    updateStats();
  });
}

// ADD
window.addItem = async function(){
  const name = document.getElementById("f-name").value.trim();
  const qty = parseInt(document.getElementById("f-qty").value);
  const min = parseInt(document.getElementById("f-min").value);
  const price = parseFloat(document.getElementById("f-price").value) || 0;

  if(!name || isNaN(qty) || isNaN(min)){
    alert("Champs invalides");
    return;
  }

  if(qty < 0 || min < 0){
    alert("Valeurs invalides");
    return;
  }

  if(items.some(i=>i.name.toLowerCase()===name.toLowerCase())){
    alert("Article déjà existant");
    return;
  }

  const btn = document.getElementById("add-btn");
  btn.disabled = true;
  btn.innerText = "Ajout...";

  try{
    await addDoc(collection(db,"items"),{
      name, qty, min, price
    });
  }catch(e){
    console.error(e);
    alert("Erreur Firebase");
  }finally{
    btn.disabled = false;
    btn.innerText = "Ajouter";
  }
};

// RENDER
function render(){
  let html = "";

  items.forEach(i=>{
    html += `
      <div class="card">
        <b>${i.name}</b><br>
        Stock: ${i.qty}<br>
        Prix: ${i.price||0}€
      </div>
    `;
  });

  document.getElementById("items-list").innerHTML = html;
  updateStats();
}

// STATS
function updateStats(){
  let totalValue = 0;
  let crit = 0;
  let empty = 0;

  items.forEach(i=>{
    totalValue += (i.qty||0)*(i.price||0);
    if(i.qty === 0) empty++;
    else if(i.qty <= i.min) crit++;
  });

  document.getElementById("s-total").innerText = items.length;
  document.getElementById("s-crit").innerText = crit;
  document.getElementById("s-empty").innerText = empty;
  document.getElementById("s-value").innerText = totalValue.toFixed(2)+"€";
  document.getElementById("s-moves").innerText = hist.length;
}

// PWA
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js')
    .then(()=>console.log("SW OK"))
    .catch(e=>console.error(e));
}
</script>

</body>
</html>
